name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install pytest pyyaml
      - name: Compile governance modules
        run: python -m py_compile src/governance.py src/training_admission.py
      - name: Run governance tests
        run: python -m pytest -q tests
