name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install pytest pyyaml requests
      - name: Compile reliability modules
        run: >-
          python -m py_compile
          src/governance.py
          src/training_admission.py
          src/model_gateway.py
          src/retrieval_core.py
          src/claim_verification.py
          src/retrieval_security.py
          src/citation_extractor.py
          src/pipeline.py
      - name: Run reliability tests
        run: python -m pytest -q tests
