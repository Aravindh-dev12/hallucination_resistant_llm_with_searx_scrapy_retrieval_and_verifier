name: Deploy existing Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "docs/**"
      - "requirements-space.txt"
      - ".github/workflows/deploy-huggingface.yml"

permissions:
  contents: read

concurrency:
  group: huggingface-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF_TOKEN
    timeout-minutes: 15
    env:
      HF_SPACE: Aravindhan11/hallucination_resistant_llm_with_searx_scrapy_retrieval_and_verifier_ensemble
      HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.HUGGINGFACE_TOKEN || secrets.HUGGING_FACE_HUB_TOKEN }}

    steps:
      - name: Check out GitHub source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Require Hugging Face deployment secret
        shell: bash
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "No Hugging Face token found in the HF_TOKEN environment."
            exit 1
          fi

      - name: Clone existing Space
        shell: bash
        run: |
          git clone "https://Aravindhan11:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE" space

      - name: Update CPU Space implementation
        shell: bash
        run: |
          mkdir -p space/src space/config space/docs
          cp -R source/src/. space/src/
          cp -R source/config/. space/config/
          cp -R source/docs/. space/docs/
          cp source/requirements-space.txt space/requirements.txt
          cp source/config/huggingface-space.yaml space/src/config.yaml

      - name: Commit and push existing Space
        working-directory: space
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src config docs requirements.txt
          if git diff --cached --quiet; then
            echo "Space is already up to date"
            exit 0
          fi
          git commit -m "Deploy CPU-compatible reliability upgrade"
          git push origin HEAD:main
