    model: WeiboAI/VibeThinker-3B
    base_url: http://127.0.0.1:8000/v1
    purpose: candidate_generation
    enabled: false
  thinkcoder:
    provider: openai_compatible
    model: REPLACE_WITH_PINNED_THINKCODER_ID
