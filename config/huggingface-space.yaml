model:
  generator_instruct: "HuggingFaceTB/SmolLM2-135M-Instruct"
  generator_large: "HuggingFaceTB/SmolLM2-135M-Instruct"
  embedding: "sentence-transformers/all-MiniLM-L6-v2"
  cross_encoder: "cross-encoder/ms-marco-TinyBERT-L2-v2"
  verifier_1: "cross-encoder/nli-deberta-v3-xsmall"
  verifier_2: "cross-encoder/nli-deberta-v3-xsmall"
  asr: "openai/whisper-tiny"

data:
  raw_dir: "data/sources"
  processed_dir: "data/processed"
  index_path: "data/faiss_index.bin"
  docs_jsonl: "data/processed/docs.jsonl"

retrieval:
  candidate_k: 12
  rerank_top_k: 6
  evidence_k: 4
  fusion_weights: [1.0, 1.0]
  rrf_rank_constant: 60

verification:
  entailment_threshold: 0.55
  contradiction_threshold: 0.70
  corrective_retries: 1

inference:
  max_tokens: 160
  temperature: 0.0
